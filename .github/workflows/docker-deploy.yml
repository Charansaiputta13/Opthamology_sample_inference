name: Docker Build & Deploy

on:
  push:
    branches:
      - master
      - main
  pull_request:
    branches:
      - master
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/dr-classifier:latest
            ${{ secrets.DOCKER_USERNAME }}/dr-classifier:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  test:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run setup verification
        run: python verify_pytorch_setup.py

      - name: Test imports
        run: |
          python -c "from src.config import Config; print('✅ Config OK')"
          python -c "from src.model import DRClassifier; print('✅ Model OK')"
          python -c "from src.inference import predict_single_image; print('✅ Inference OK')"

  deploy:
    needs: [build, test]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Deploy to Heroku
        env:
          HEROKU_API_KEY: ${{ secrets.HEROKU_API_KEY }}
          HEROKU_APP_NAME: ${{ secrets.HEROKU_APP_NAME }}
        run: |
          if [ ! -z "$HEROKU_API_KEY" ] && [ ! -z "$HEROKU_APP_NAME" ]; then
            curl https://cli-assets.heroku.com/install.sh | sh
            heroku login -e "${{ secrets.HEROKU_EMAIL }}" --auth-token "$HEROKU_API_KEY"
            git remote add heroku https://git.heroku.com/$HEROKU_APP_NAME.git
            git push heroku master
          else
            echo "Heroku credentials not configured - skipping Heroku deployment"
          fi

      - name: Deploy to Google Cloud Run
        if: startsWith(secrets.GCP_PROJECT_ID, '')
        uses: google-github-actions/deploy-cloudrun@v0
        with:
          service: dr-classifier
          image: gcr.io/${{ secrets.GCP_PROJECT_ID }}/dr-classifier
          region: us-central1
