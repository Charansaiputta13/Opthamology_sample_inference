# Streamlit configuration for cloud deployment
# Place this in .streamlit/config.toml

[theme]
primaryColor = "#1f77b4"
backgroundColor = "#ffffff"
secondaryBackgroundColor = "#f5f5f5"
textColor = "#262730"
font = "sans serif"

[server]
port = 8501
enableXsrfProtection = false
maxUploadSize = 200
enableCORS = true
headless = true
runOnSave = false

[client]
toolbarMode = "minimal"
showErrorDetails = false

[logger]
level = "info"
messageFormat = "%(asctime)s.%(msecs)03d %(levelname) -s: %(message)s"
dateFormat = "%Y-%m-%d %H:%M:%S"

[frontend]
showPrideEmojiOnHolidays = false

[ui]
hideTopBar = false
hideFooter = false
hideRunningIndicator = false

# Memory and performance
[client.showErrorDetails]
enabled = false

[cache]
maxEntriesInMemory = 1000

# Browser configuration
[browser]
gatherUsageStats = false
serverAddress = "0.0.0.0"
